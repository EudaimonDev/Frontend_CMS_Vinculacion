<div class="register-form" [formGroup]="form">

  <div class="form-header">
    <img src="images/logo-ug.png" alt="Universidad de Guayaquil" class="logo-ug" />
    <img src="images/logo-alianza.png" alt="Misión Alianza" class="logo-alianza" />
    <div class="form-header-text">
      <strong>Universidad de Guayaquil</strong>
      <span>EN ALIANZA CON MISIÓN ALIANZA</span>
    </div>
  </div>

  <h1 class="form-title">Bienvenido al Portal</h1>
  <p class="form-subtitle">Completa los siguientes datos para continuar.</p>

  @if (error()) {
    <div class="alert alert--error" role="alert">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ error() }}
    </div>
  }

  <!-- NOMBRES (OPCIONAL)
  <div class="form-group">
    <label class="form-label" for="nombres">Nombres (opcional)</label>
    <input
      id="nombres"
      type="text"
      formControlName="nombres"
      class="form-input"
      placeholder="Tu nombre"
      autocomplete="given-name"
    />
  </div>

  -->


  <!-- EDAD (OBLIGATORIO) -->
  <div class="form-group" [class.form-group--error]="isInvalid('edad')">
    <label class="form-label" for="edad">Edad</label>
    <input
      id="edad"
      type="text"
      formControlName="edad"
      class="form-input"
      placeholder="Tu edad"
      (keypress)="soloNumeros($event)"
      maxlength="3"
      inputmode="numeric"
    />
    @if (isInvalid('edad')) {
      <span class="form-error">Ingresa una edad válida</span>
    }
  </div>

  <!-- SEXO (OBLIGATORIO) -->
  <div class="form-group" [class.form-group--error]="isInvalid('sexo')">
    <label class="form-label">Sexo</label>
    <div class="sexo-options">
      <button
        type="button"
        class="sexo-btn"
        [class.sexo-btn--active]="form.get('sexo')?.value === 'femenino'"
        (click)="form.get('sexo')?.setValue('femenino')"
      >
        Femenino
      </button>
      <button
        type="button"
        class="sexo-btn"
        [class.sexo-btn--active]="form.get('sexo')?.value === 'masculino'"
        (click)="form.get('sexo')?.setValue('masculino')"
      >
        Masculino
      </button>
      <button
        type="button"
        class="sexo-btn"
        [class.sexo-btn--active]="form.get('sexo')?.value === 'otro'"
        (click)="form.get('sexo')?.setValue('otro')"
      >
        Otro
      </button>
    </div>
    @if (isInvalid('sexo')) {
      <span class="form-error">Selecciona una opción</span>
    }
  </div>

  <button
    type="button"
    class="btn-submit"
    [disabled]="loading()"
    (click)="onSubmit()"
  >
    @if (loading()) {
      <span class="spinner"></span>
      Verificando...
    } @else {
      Ingresar al Portal
    }
  </button>

  <a routerLink="/admin/login" class="btn-portal">
    Ir al portal administrativo
  </a>

</div>
