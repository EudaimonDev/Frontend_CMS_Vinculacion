<nav class="navbar">
  <a class="nav-logo" routerLink="/" aria-label="Inicio">
    <img src="images/UG_logo_white_105x58_optimized.webp" alt="UG Logo" height="24px">
    <strong>wiki</strong>
  </a>

  <div class="nav-toggle"
     (click)="toggleMenu()"
     (keydown.enter)="toggleMenu()"
     role="button"
     tabindex="0">☰</div>

  <div class="nav-content" [class.open]="menuOpen">
    <button
      class="nav-pill"
      [class.active]="activeCategory() === 'todos'"
      (click)="setActive('todos')"
    >
      Todos
    </button>

    <div class="nav-links">
  @for (link of navLinks(); track link.slug) {
    <a [routerLink]="link.route"
       [class.active]="activeCategory() === link.slug"
       (click)="setActive(link.slug)">
      {{ link.label }}
    </a>
  }
</div>

    <div class="nav-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8" />
        <path d="m21 21-4.35-4.35" />
      </svg>
      <input
        type="text"
        placeholder="Buscar artículos..."
        [(ngModel)]="searchQuery"
        (keydown.enter)="perfomSearch()"
      />
    </div>

    <button type="button" class="nav-logout" (click)="cerrarSesion()">
      Cerrar sesión
    </button>
  </div>
</nav>
